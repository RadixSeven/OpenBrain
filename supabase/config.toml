
[functions.capture-api]
enabled = true
verify_jwt = true
import_map = "./functions/capture-api/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/capture-api/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/capture-api/*.html" ]

[functions.open-brain-mcp]
enabled = true
verify_jwt = true
import_map = "./functions/open-brain-mcp/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/open-brain-mcp/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to include Markdown pages:
# static_files = [ "./functions/open-brain-mcp/*.md" ]
